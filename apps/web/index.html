<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Researchly — research smarter. Find literature-grounded research ideas, gaps, and verified novelty in minutes." />
    <meta name="theme-color" content="#4338ca" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Researchly" />
    <link rel="apple-touch-icon" href="/pwa-maskable.svg" />
    <script>
      (function () {
        try {
          var standalone =
            window.matchMedia("(display-mode: standalone)").matches ||
            window.matchMedia("(display-mode: minimal-ui)").matches ||
            window.matchMedia("(display-mode: fullscreen)").matches ||
            window.navigator.standalone === true;
          document.documentElement.dataset.pwaMode = standalone ? "standalone" : "browser";
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("researchly-theme");
          var dark =
            t === "dark" ||
            ((t === "system" || !t) && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) {
            document.documentElement.setAttribute("data-theme", "dark");
            document.documentElement.setAttribute("data-bs-theme", "dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Researchly — Research smarter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
