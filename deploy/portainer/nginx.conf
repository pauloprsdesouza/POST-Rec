server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /portainer {
        return 301 /portainer/;
    }

    # Portainer hard-codes /locales and /api at the domain root.
    location /locales/ {
        set $portainer_upstream portainer:9000;
        proxy_pass http://$portainer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $portainer_upstream portainer:9000;
        proxy_pass http://$portainer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /portainer/ {
        set $portainer_upstream portainer:9000;
        rewrite ^/portainer/?(.*)$ /$1 break;
        proxy_pass http://$portainer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /portainer;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        sub_filter '<base id="base"/>' '<base id="base" href="/portainer/"/>';
        sub_filter_once on;
    }
}
