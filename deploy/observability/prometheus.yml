global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postrec-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service_name: postrec-api

  - job_name: postrec-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]
        labels:
          service_name: postrec-worker
