# Auto-generated static Traefik config — do not edit manually.
# Re-run: python scripts/generate_traefik_apps.py --write

api:
  dashboard: false

log:
  level: INFO

entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@paulorobertosouza.com.br
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: http
