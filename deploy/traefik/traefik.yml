# Static Traefik configuration for POST-Rec production routing.
# Dynamic routes: /etc/traefik/dynamic/apps.yaml (generated by scripts/generate_traefik_apps.py)

api:
  dashboard: false

log:
  level: INFO

entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${LETSENCRYPT_EMAIL:-admin@paulorobertosouza.com.br}"
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: http
