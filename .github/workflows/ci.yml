# POST-Rec CI — patterns used by enterprise teams (GitHub, Stripe, AWS docs):
# - Least-privilege permissions
# - Cancel superseded runs on the same branch/PR
# - Parallel jobs for fast feedback (lint / test / build)
# - Dependency caching (pip, npm)
# - Service containers mirroring production deps
# - Immutable action versions (major tags)
# - Required checks gate merges via branch protection

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev tools
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check apps packages tests

      - name: Ruff format check
        run: ruff format --check apps packages tests

  python-security:
    name: Python security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install bandit
        run: pip install bandit

      - name: Bandit (apps + packages)
        run: bandit -r apps packages -ll -q

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postrec
          POSTGRES_USER: postrec
          POSTGRES_PASSWORD: postrec
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postrec:postrec@localhost:5432/postrec
      OTEL_ENABLED: "false"
      AUTH_ENABLED: "false"
      WHATSAPP_NOTIFICATIONS_ENABLED: "true"
      RETRIEVAL_CACHE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Unit tests
        run: pytest tests/unit -v --cov=apps --cov=packages/postrec_core --cov-report=term-missing

      - name: Integration tests
        run: pytest tests/integration -v

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Build API image
        run: docker build -t post-rec-api:ci .

      - name: Build web image
        run: docker build -t post-rec-web:ci ./apps/web

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [python-lint, python-security, python-test, web, docker]
    if: always()
    steps:
      - name: Require all jobs
        run: |
          if [[ "${{ needs.python-lint.result }}" != "success" ]] \
            || [[ "${{ needs.python-security.result }}" != "success" ]] \
            || [[ "${{ needs.python-test.result }}" != "success" ]] \
            || [[ "${{ needs.web.result }}" != "success" ]] \
            || [[ "${{ needs.docker.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
