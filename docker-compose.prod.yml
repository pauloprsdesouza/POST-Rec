# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Public access via Traefik (Coolify proxy on 80/443).
# See deploy/traefik/apps.yaml for domain routing.

services:
  postgres:
    ports: !reset []
    networks:
      default:
      coolify:
        aliases:
          - shared-postgres

  redis:
    ports: !reset []
    networks:
      default:
      coolify:
        aliases:
          - shared-redis

  rabbitmq:
    ports: !reset []

  minio:
    ports: !reset []

  evolution-api:
    ports: !reset []
    networks:
      default:
      coolify:
        aliases:
          - postrec-evolution-api
    environment:
      SERVER_URL: https://paulorobertosouza.com.br/evolution
      SERVER_DISABLE_MANAGER: "false"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE,PATCH
      CORS_CREDENTIALS: "false"

  evolution-manager:
    ports: !reset []
    profiles:
      - dev-ui

  api:
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports: !reset []
    volumes: !reset []

  worker:
    volumes: !reset []

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /postrec
        VITE_BASE_PATH: /postrec
    ports: !reset []
    networks:
      default:
      coolify:
        aliases:
          - postrec-web

  landing:
    build: ./deploy/landing
    container_name: postrec-landing
    restart: unless-stopped
    networks:
      - coolify

  unknown-app:
    build: ./deploy/unknown-app
    container_name: postrec-unknown-app
    restart: unless-stopped
    networks:
      - coolify

  portainer:
    image: portainer/portainer-ce:2.27.9
    container_name: postrec-portainer
    restart: unless-stopped
    command:
      - -H
      - unix:///var/run/docker.sock
      - --http-enabled
      - --trusted-origins=paulorobertosouza.com.br,www.paulorobertosouza.com.br
      - --admin-password=$$2b$$12$$gQ5EzADHy65eghgRUozkCOJyycgjrLKbB4B7b57usypWeIobqgp1y
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - postrec_portainer_data:/data
    networks:
      - default

  portainer-proxy:
    build: ./deploy/portainer
    container_name: postrec-portainer-proxy
    restart: unless-stopped
    depends_on:
      - portainer
    networks:
      default:
      coolify:
        aliases:
          - postrec-portainer-proxy

networks:
  coolify:
    external: true
