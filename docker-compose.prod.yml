# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Public access via standalone Traefik on 80/443.
# See deploy/traefik/apps.yaml for domain routing.

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  rabbitmq:
    ports: !reset []

  minio:
    ports: !reset []

  evolution-api:
    ports: !reset []
    networks:
      default:
      proxy:
        aliases:
          - postrec-evolution-api
    environment:
      SERVER_URL: https://paulorobertosouza.com.br/evolution
      SERVER_DISABLE_MANAGER: "false"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE,PATCH
      CORS_CREDENTIALS: "false"

  evolution-manager:
    ports: !reset []
    profiles:
      - dev-ui

  api:
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports: !reset []
    volumes: !reset []

  worker:
    volumes: !reset []

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /researchly
        VITE_BASE_PATH: /researchly
    ports: !reset []
    networks:
      default:
      proxy:
        aliases:
          - postrec-web

  landing:
    build: ./deploy/landing
    container_name: postrec-landing
    restart: unless-stopped
    networks:
      - proxy

  unknown-app:
    build: ./deploy/unknown-app
    container_name: postrec-unknown-app
    restart: unless-stopped
    networks:
      - proxy

  portainer:
    image: portainer/portainer-ce:2.27.9
    container_name: postrec-portainer
    restart: unless-stopped
    command:
      - -H
      - unix:///var/run/docker.sock
      - --http-enabled
      - --trusted-origins=paulorobertosouza.com.br,www.paulorobertosouza.com.br
      - --admin-password=$$2b$$12$$gQ5EzADHy65eghgRUozkCOJyycgjrLKbB4B7b57usypWeIobqgp1y
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - postrec_portainer_data:/data
    networks:
      - default

  portainer-proxy:
    build: ./deploy/portainer
    container_name: postrec-portainer-proxy
    restart: unless-stopped
    depends_on:
      - portainer
    networks:
      default:
      proxy:
        aliases:
          - postrec-portainer-proxy

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: postrec-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - default

  loki:
    image: grafana/loki:3.4.2
    container_name: postrec-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  promtail:
    image: grafana/promtail:3.4.2
    container_name: postrec-promtail
    restart: unless-stopped
    volumes:
      - ./deploy/observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - default

  grafana:
    image: grafana/grafana:11.5.2
    container_name: postrec-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?set GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: ${DEPLOY_DOMAIN:?set DEPLOY_DOMAIN}
    volumes:
      - postrec_grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      default:

  grafana-proxy:
    build: ./deploy/grafana
    container_name: postrec-grafana-proxy
    restart: unless-stopped
    depends_on:
      - grafana
    networks:
      default:
      proxy:
        aliases:
          - postrec-grafana-proxy

  traefik:
    image: traefik:v3.3
    container_name: postrec-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@${DEPLOY_DOMAIN}}
    volumes:
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/apps.yaml:/etc/traefik/dynamic/apps.yaml:ro
      - postrec_traefik_certs:/etc/traefik/acme
    networks:
      - proxy

networks:
  proxy:
    driver: bridge

volumes:
  postrec_traefik_certs:
